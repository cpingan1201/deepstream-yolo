logLevel: info
logDestinations: [file]
logFile: /home/userroot/ultralytics-main/ds_run/artemis_hls/mediamtx.log

rtsp: yes
rtspAddress: :8554

# Prefer TCP for many-camera analytics. UDP under load is easier to drop/reorder.
rtspTransports: [tcp]

# Keep publisher replacement enabled so the relay can refresh a temporary
# Hikvision preview URL without changing the downstream RTSP address.
paths:
  all_others:
    source: publisher
    overridePublisher: yes
